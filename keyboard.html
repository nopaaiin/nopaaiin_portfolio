<!DOCTYPE html>

<title>Keyboard Reactive — NOPAAIIN</title>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  background:#050505;
  color:white;
  font-family:Arial, sans-serif;
  padding:40px;
  max-width:960px;
  margin:0 auto;
}
.back{
  display:inline-flex;
  align-items:center;
  gap:8px;
  color:#b5b5b5;
  text-decoration:none;
  font-size:14px;
  margin-bottom:40px;
  transition:color .2s;
}
.back:hover{ color:#ff2aa6; }
.back::before{ content:"←"; font-size:18px; }
.project-number{ font-size:14px; color:#b5b5b5; margin-bottom:12px; letter-spacing:0.08em; }
h1{ font-size:56px; font-weight:900; color:#ff2aa6; margin-bottom:16px; line-height:1.1; }

.video-wrap{

  border-radius:20px;

  border:1px solid #3a3a3a;
  background:#111;
  margin-bottom:48px;
}
.video-wrap video{ width:100%; display:block; }
.divider{ border:none; border-top:1px solid #2a2a2a; margin:40px 0; }
.section-label{ font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:#ff2aa6; margin-bottom:12px; }
.section-body{ font-size:16px; line-height:1.8; color:#c8c8c8; }
.placeholder-text{ color:#555; font-style:italic; }
.screenshots{ display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-top:16px; }
.screenshot-slot{
  aspect-ratio:16/9;
  border-radius:12px;
  border:1px dashed #3a3a3a;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#444;
  font-size:13px;

  <a href="index.html" class="back">Back to Works</a>

      <source src="keyboardreactive.mov" type="video/mp4">
